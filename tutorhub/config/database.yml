default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("DB_POOL") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_DEV", "tutorhub_dev") %>
    username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
    password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
    url: <%= ENV["DATABASE_URL"] %>

test:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME_TEST", "tutorhub_test") %>
    username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
    password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>
    host: <%= ENV.fetch("DB_HOST", "localhost") %>
    port: <%= ENV.fetch("DB_PORT", 5432) %>
    url: <%= ENV["DATABASE_URL_TEST"] %>

production:
  primary:
    <<: *default
    url: <%= ENV["DATABASE_URL"] %>
